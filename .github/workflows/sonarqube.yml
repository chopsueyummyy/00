name: Build
on:
  push:
    branches:
      - master        # FIXED: Changed from 'main' to 'master' to match your repo
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest # RECOMMENDED: Much faster/cheaper than windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Since you are analyzing Flutter, you need the Flutter SDK setup first
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5 # Updated to stable v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
